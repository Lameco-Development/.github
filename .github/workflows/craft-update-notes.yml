name: Craft Update Notices

on:
  workflow_call:

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare composer.lock and parse changelogs
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // ── 1. Load old and new composer.lock ────────────────────────────
            const baseBranch = context.payload.pull_request.base.ref;
            execSync(`git fetch origin ${baseBranch} --depth=1`);

            let oldLockContent;
            try {
              oldLockContent = execSync(`git show origin/${baseBranch}:composer.lock`).toString();
            } catch {
              console.log('No composer.lock on base branch, skipping.');
              return core.setOutput('skip', 'true');
            }

            const newLockContent = fs.readFileSync('composer.lock', 'utf8');
            const oldLock = JSON.parse(oldLockContent);
            const newLock = JSON.parse(newLockContent);

            function buildMap(lock) {
              const map = {};
              for (const pkg of [...(lock.packages || []), ...(lock['packages-dev'] || [])]) {
                map[pkg.name] = {
                  version: pkg.version.replace(/^v/, ''),
                  source: pkg.source,
                };
              }
              return map;
            }

            const oldMap = buildMap(oldLock);
            const newMap = buildMap(newLock);

            // ── 2. Find updated packages that have a GitHub source URL ───────
            const updated = [];
            for (const [name, newPkg] of Object.entries(newMap)) {
              const oldPkg = oldMap[name];
              if (!oldPkg || oldPkg.version === newPkg.version) continue;

              const sourceUrl = newPkg.source?.url || '';
              const ghMatch = sourceUrl.match(/github\.com[:/]([^/]+)\/([^/.]+)(\.git)?$/);
              if (!ghMatch) continue;

              updated.push({
                name,
                oldVersion: oldPkg.version,
                newVersion: newPkg.version,
                ghOwner: ghMatch[1],
                ghRepo: ghMatch[2],
              });
            }

            if (!updated.length) {
              console.log('No packages with GitHub sources updated.');
              return core.setOutput('skip', 'true');
            }

            // ── 3. Changelog helpers ─────────────────────────────────────────
            function isNewerVersion(a, b) {
              const pa = a.split('.').map(Number);
              const pb = b.split('.').map(Number);
              for (let i = 0; i < 3; i++) {
                if (pa[i] > pb[i]) return true;
                if (pa[i] < pb[i]) return false;
              }
              return false;
            }

            function parseChangelog(changelog, oldVersion, newVersion) {
              const lines = changelog.split('\n');
              const sections = [];
              let inRange = false;
              let currentVersion = null;
              let currentLines = [];

              for (const line of lines) {
                // Match common heading formats: ## 1.2.3, ## v1.2.3, ## 1.2.3 - date
                const match = line.match(/^##\s+v?(\d+\.\d+\.\d+)/);
                if (match) {
                  if (inRange && currentLines.length) {
                    sections.push({ version: currentVersion, lines: [...currentLines] });
                  }
                  currentVersion = match[1];
                  currentLines = [];
                  inRange =
                    isNewerVersion(currentVersion, oldVersion) &&
                    (isNewerVersion(newVersion, currentVersion) || currentVersion === newVersion);
                } else if (inRange) {
                  currentLines.push(line);
                }
              }
              if (inRange && currentLines.length) {
                sections.push({ version: currentVersion, lines: currentLines });
              }

              const notices = [];
              const security = [];

              for (const { version, lines: vlines } of sections) {
                for (let i = 0; i < vlines.length; i++) {
                  const line = vlines[i];

                  // GitHub admonition blocks: > [!WARNING], > [!NOTE], > [!CAUTION], > [!IMPORTANT]
                  const admonitionMatch = line.match(/^>\s*\[!(WARNING|NOTE|CAUTION|IMPORTANT)\]/i);
                  if (admonitionMatch) {
                    const type = admonitionMatch[1].toUpperCase();
                    const msgLines = [];
                    let j = i + 1;
                    while (j < vlines.length && /^>\s*/.test(vlines[j])) {
                      const content = vlines[j].replace(/^>\s*/, '').trim();
                      if (content) msgLines.push(content);
                      j++;
                    }
                    if (msgLines.length) notices.push(`**${version} [${type}]:** ${msgLines.join(' ')}`);
                    continue;
                  }

                  // Legacy inline > **Note:** style
                  if (/^>\s*\*{0,2}Note:/i.test(line)) {
                    const msg = line.replace(/^>\s*\*{0,2}Note:\*{0,2}\s*/i, '').trim();
                    if (msg) notices.push(`**${version} [NOTE]:** ${msg}`);
                    continue;
                  }

                  // Security severity lines (Craft CMS convention)
                  if (/\[critical-severity\]|\[high-severity\]|\[moderate-severity\]/i.test(line)) {
                    security.push(`**${version}:** ${line.replace(/^-\s*/, '').trim()}`);
                  }
                }
              }

              return { notices, security };
            }

            // ── 4. Process each updated package ─────────────────────────────
            let commentSections = [];
            const allUpdated = [];

            for (const pkg of updated) {
              const { name, oldVersion, newVersion, ghOwner, ghRepo } = pkg;
              allUpdated.push(pkg);

              // Try common default branch names
              let changelog = null;
              for (const branch of ['main', 'master', 'develop']) {
                try {
                  const res = await fetch(
                    `https://raw.githubusercontent.com/${ghOwner}/${ghRepo}/${branch}/CHANGELOG.md`
                  );
                  if (res.ok) { changelog = await res.text(); break; }
                } catch {}
              }

              if (!changelog) {
                commentSections.push(
                  `### 📦 \`${name}\`: \`${oldVersion}\` → \`${newVersion}\`\n` +
                  `_No CHANGELOG.md found — check [releases](https://github.com/${ghOwner}/${ghRepo}/releases) manually._`
                );
                continue;
              }

              const { notices, security } = parseChangelog(changelog, oldVersion, newVersion);

              // Only add a section if there is something worth flagging
              if (!notices.length && !security.length) continue;

              let section = `### 📦 \`${name}\`: \`${oldVersion}\` → \`${newVersion}\`\n`;
              if (security.length) {
                section += `**🔒 Security Fixes:**\n${security.map(l => `- ${l}`).join('\n')}\n\n`;
              }
              if (notices.length) {
                section += `**⚠️ Notices & Breaking Changes:**\n${notices.map(l => `- ${l}`).join('\n')}\n`;
              }
              commentSections.push(section);
            }

            if (!commentSections.length && !allUpdated.length) {
              return core.setOutput('skip', 'true');
            }

            // ── 5. Build final comment ────────────────────────────────────────
            let comment = `## 🔍 Craft Package Updates\n\n`;

            if (commentSections.length) {
              comment += commentSections.join('\n---\n') + '\n\n';
            } else {
              comment += `✅ No security advisories or breaking change notices found.\n\n`;
            }

            // Summary table of every updated package
            comment += `---\n### 📋 All updated packages\n`;
            comment += `| Package | From | To | Changelog |\n|---|---|---|---|\n`;
            for (const { name, oldVersion, newVersion, ghOwner, ghRepo } of allUpdated) {
              comment += `| \`${name}\` | \`${oldVersion}\` | \`${newVersion}\` | [View](https://github.com/${ghOwner}/${ghRepo}/blob/main/CHANGELOG.md) |\n`;
            }

            core.setOutput('comment', comment);

      - name: Post comment on PR
        if: steps.parse.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = process.env.COMMENT;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment,
            });
        env:
          COMMENT: ${{ steps.parse.outputs.comment }}
