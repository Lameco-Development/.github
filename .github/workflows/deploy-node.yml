name: Deploy Node

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (e.g. production, staging)"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USER:
        required: true

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v5.1.2
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ vars.SSH_PORT || '22' }}
          SOURCE: ./
          TARGET: /projects/${{ secrets.SSH_USER }}/app
          EXCLUDE: '.git/,node_modules/,.next/cache/,.env,.env.local,.claude/,.planning/'

      - name: Install production dependencies and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || '22' }}
          script: |
            cd /projects/${{ secrets.SSH_USER }}/app
            export NVM_DIR="${HOME}/.nvm"
            source /usr/local/bin/nvm
            nvm use
            pnpm install --frozen-lockfile --prod
            supervisorctl -c /etc/projects/supervisor/$USER.conf restart application
